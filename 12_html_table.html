<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Table Tag
    </title>
</head>
<body>

    <table border="1" cellpadding="15" cellspacing="0">
        <thead>
            <tr>
                
                <th>Subject name</th>
                <th>out of marks</th>
                <th>Obtained marks</th>
                
            </tr>
        </thead>
        <tbody>
            <tr>
                
                <td>math</td>
                <td>100</td>
                <td>90</td>
            
            </tr>
            <tr>
                <td>english</td>
                <td>100</td>
                <td>80</td>
                
            </tr>
            <tr>
                <td>science</td>
                <td>100</td>
                <td>70</td>
                
            </tr>
        </tbody>
        <tfoot>
            <tr>
                <td colspan="2">percentage</td>
                <td>80.50</td>
            </tr>
        </tfoot>
    </table>
    
</body>
</html>
