<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <svg xmlns="http://www.w3.org/2000/svg" width="800" height="500" viewBox="0 0 800 500">

  <!-- Room -->
  <rect width="800" height="500" fill="#f5f5f5"/>
  <rect y="350" width="800" height="150" fill="#d9d9d9"/>

  <!-- Desk -->
  <rect x="220" y="250" width="360" height="20" fill="#8b5a2b"/>
  <rect x="240" y="270" width="15" height="100" fill="#6d4c41"/>
  <rect x="545" y="270" width="15" height="100" fill="#6d4c41"/>

  <!-- Computer -->
  <rect x="330" y="150" width="140" height="90" rx="8" fill="#333"/>
  <rect x="340" y="160" width="120" height="70" fill="#4fc3f7"/>
  <rect x="390" y="240" width="20" height="15" fill="#555"/>
  <rect x="370" y="255" width="60" height="8" fill="#555"/>

  <!-- Keyboard -->
  <rect x="345" y="285" width="110" height="18" rx="3" fill="#999"/>

  <!-- Chair -->
  <rect x="120" y="240" width="70" height="90" rx="8" fill="#1976d2"/>
  <rect x="145" y="330" width="20" height="60" fill="#555"/>

  <!-- Plant -->
  <rect x="650" y="280" width="40" height="40" fill="#8d6e63"/>
  <circle cx="670" cy="250" r="25" fill="#4caf50"/>
  <circle cx="650" cy="265" r="18" fill="#43a047"/>
  <circle cx="690" cy="265" r="18" fill="#43a047"/>

  <!-- Window -->
  <rect x="50" y="70" width="180" height="120" fill="#90caf9" stroke="#666"/>
  <line x1="140" y1="70" x2="140" y2="190" stroke="white" stroke-width="3"/>
  <line x1="50" y1="130" x2="230" y2="130" stroke="white" stroke-width="3"/>

  <!-- Person -->
  <circle cx="290" cy="210" r="20" fill="#ffcc80"/>
  <rect x="275" y="230" width="30" height="55" fill="#26a69a"/>
  <line x1="275" y1="250" x2="245" y2="280" stroke="#26a69a" stroke-width="6"/>
  <line x1="305" y1="250" x2="335" y2="280" stroke="#26a69a" stroke-width="6"/>
  <line x1="285" y1="285" x2="275" y2="330" stroke="#333" stroke-width="6"/>
  <line x1="295" y1="285" x2="305" y2="330" stroke="#333" stroke-width="6"/>

</svg>
</body>
</html>
